services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: benca_sql
    restart: unless-stopped
    environment:
      SA_PASSWORD: "StrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./database/init.sql:/init.sql
      - ./start.sh:/start.sh
    # command: ["/bin/bash", "/start.sh"]  #need to be fixed to work automatically when the container starts

volumes:
  sql_data: